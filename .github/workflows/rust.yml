name: rust

# Quality gates for the airc-rust workspace (anything under `crates/`).
#
# Three jobs on every PR + push touching Rust:
#   fmt      — `cargo fmt --check` (no formatter drift)
#   clippy   — regular all-target warning gate plus a production-only
#              no-silent-fallback gate. Tests may stay concise, but
#              library/binary code cannot use unwrap/expect/panic/todo/
#              unimplemented or wildcard enum matches.
#   test     — `cargo test --all-features` (every test green)
#   quality  — repo policy guard for Rust lint inheritance and banned
#              fallback/cutover command surfaces
#
# Per Joel's direction (2026-05-18): "use rust conventions and obsession
# with tests. clippy, fmt etc." These three gates are the substrate-quality
# bar every airc-rust PR clears before merge.
#
# The clean-install / install.sh smoke jobs in ci.yml continue to validate
# the Python+bash install path; this workflow specifically gates the
# Rust workspace as it grows.

on:
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "test/rust_quality_guard.sh"
      - ".github/workflows/rust.yml"
  push:
    branches: [canary, main, rust-rewrite]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "test/rust_quality_guard.sh"
      - ".github/workflows/rust.yml"

# A new push to the same PR/branch obsoletes the in-flight run —
# cancel it instead of queueing behind it. Three moot runs were
# cancelled by hand on 2026-06-10 alone, and every moot run occupies
# the single self-hosted Windows leg (bigmama) that everything else
# queues behind. `github.ref` is unique per PR (refs/pull/N/merge) and
# per branch, so unrelated runs never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      # Self-defending guard (sentinel ask on #1116): the self-hosted leg
      # refuses fork-PR code before checkout. Lives at STEP level because
      # the `matrix` context is not available in job-level `if` — the
      # original job-level form failed the whole workflow at parse time
      # (zero-jobs startup failures since 23:13). The repo-level fork-PR
      # approval policy (all_external_contributors) is a mutable SETTING;
      # this guard lives in-repo so a policy regression alone can't put
      # fork code on the bigmama runner. Hosted legs are unaffected.
      - name: refuse fork PRs on self-hosted
        if: ${{ contains(toJSON(matrix.os), 'self-hosted') && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "::error::fork-PR code must not execute on the self-hosted runner"
          exit 1
      - uses: actions/checkout@v4
      - name: install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (deny warnings)
    runs-on: ubuntu-latest
    steps:
      # Self-defending guard (sentinel ask on #1116): the self-hosted leg
      # refuses fork-PR code before checkout. Lives at STEP level because
      # the `matrix` context is not available in job-level `if` — the
      # original job-level form failed the whole workflow at parse time
      # (zero-jobs startup failures since 23:13). The repo-level fork-PR
      # approval policy (all_external_contributors) is a mutable SETTING;
      # this guard lives in-repo so a policy regression alone can't put
      # fork code on the bigmama runner. Hosted legs are unaffected.
      - name: refuse fork PRs on self-hosted
        if: ${{ contains(toJSON(matrix.os), 'self-hosted') && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "::error::fork-PR code must not execute on the self-hosted runner"
          exit 1
      - uses: actions/checkout@v4
      - name: install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add clippy
      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo clippy production no-silent-fallback gate
        run: >
          cargo clippy --workspace --lib --bins --
          -D warnings
          -D clippy::unwrap_used
          -D clippy::expect_used
          -D clippy::panic
          -D clippy::todo
          -D clippy::unimplemented
          -D clippy::wildcard_enum_match_arm

  quality:
    name: rust quality guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust quality guard
        run: bash test/rust_quality_guard.sh

  test:
    # Cross-platform matrix — the substrate must run on Linux, macOS,
    # and Windows. Per grievance §4, claiming Windows support from
    # install-only checks is not sufficient; runtime tests gated by
    # `#[cfg(windows)]` (like the named-pipe IPC concurrent-bind test)
    # only execute when the test job actually runs on Windows.
    name: cargo test (${{ matrix.display }})
    runs-on: ${{ matrix.os }}
    # Defense-in-depth: a hung test must never pin a runner indefinitely.
    # On 2026-06-11 a single windows-self-hosted job hung for ~18h on a
    # daemon-stdout-inheritance deadlock (card 8763f167), holding the one
    # self-hosted leg while 10+ runs starved behind it. The deadlock is
    # fixed, but the runner is a shared singleton, so a per-job ceiling
    # is the backstop: any future hang self-aborts and frees the leg
    # instead of wedging the queue. 25 min is ~3x a healthy cold run.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Windows runs on the self-hosted bigmama runner (5090 grid
        # node) — GitHub-hosted windows-latest has been queue-starved
        # for days and was blocking merges (#1114). The install-smoke
        # jobs in ci.yml deliberately STAY on windows-latest: they do
        # real machine-wide winget installs and need a virgin box,
        # which a persistent self-hosted runner is not.
        # Security: repo fork-PR approval policy is set to
        # all_external_contributors, so no fork code reaches the
        # self-hosted runner without a maintainer's explicit approval.
        include:
          - { os: ubuntu-latest, display: ubuntu-latest }
          - { os: macos-latest, display: macos-latest }
          - { os: [self-hosted, windows], display: windows-self-hosted }
    steps:
      # Self-defending guard (sentinel ask on #1116): the self-hosted leg
      # refuses fork-PR code before checkout. Lives at STEP level because
      # the `matrix` context is not available in job-level `if` — the
      # original job-level form failed the whole workflow at parse time
      # (zero-jobs startup failures since 23:13). The repo-level fork-PR
      # approval policy (all_external_contributors) is a mutable SETTING;
      # this guard lives in-repo so a policy regression alone can't put
      # fork code on the bigmama runner. Hosted legs are unaffected.
      - name: refuse fork PRs on self-hosted
        if: ${{ contains(toJSON(matrix.os), 'self-hosted') && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "::error::fork-PR code must not execute on the self-hosted runner"
          exit 1
      - uses: actions/checkout@v4
      - name: install rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features
